services:
  - type: web
    name: golf-model
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: DATAGOLF_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /tmp/golf.db
